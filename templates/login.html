{% extends "base.html" %}
{% block body %}
<h1>로그인</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/login">
  <label>아이디</label>
  <input name="username" required>
  <label>비밀번호</label>
  <input name="password" type="password" required>
  <button type="submit">로그인</button>
</form>
<div class="hr"></div>
<p><a href="/">홈</a></p>
{% endblock %}
